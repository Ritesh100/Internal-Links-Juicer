name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type (or skip with "skip")'
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
          - skip

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-bump version (workflow_dispatch only)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.bump != 'skip' }}
        run: |
          CURRENT=$(grep -m1 '^ \* Version:' op-internal-link-manager.php | sed 's/.*Version: *//' | tr -d ' ')
          IFS='.' read -r MAJ MIN PATCH <<< "$CURRENT"

          case "${{ inputs.bump }}" in
            major) MAJ=$((MAJ+1)); MIN=0; PATCH=0 ;;
            minor) MIN=$((MIN+1)); PATCH=0 ;;
            patch) PATCH=$((PATCH+1)) ;;
          esac

          NEW="$MAJ.$MIN.$PATCH"
          echo "Bumping $CURRENT → $NEW"

          sed -i "s/^ \\* Version: .*/ * Version:           $NEW/" op-internal-link-manager.php
          sed -i "s/define( 'OILM_VERSION', '.*' );/define( 'OILM_VERSION', '$NEW' );/" op-internal-link-manager.php

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add op-internal-link-manager.php
          git commit -m "Bump version to $NEW"
          git push origin main

          echo "NEW_VERSION=$NEW" >> "$GITHUB_ENV"

      - name: Read current version
        id: version
        run: |
          VERSION=$(grep -m1 '^ \* Version:' op-internal-link-manager.php | sed 's/.*Version: *//' | tr -d ' ')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Found version: $VERSION"

      - name: Tag and release
        if: ${{ !contains(github.event.head_commit.message, '[skip release]') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v$VERSION"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists — skipping release."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

          gh release create "$TAG" \
            --title "Release $TAG" \
            --generate-notes \
            --target "${{ github.sha }}"
